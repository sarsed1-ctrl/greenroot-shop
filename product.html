<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Product details — GreenRoot plant fertilizers." />
  <!-- Page title is updated dynamically by main.js renderProduct() -->
  <title>Product — GreenRoot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a href="index.html" class="logo">🌿 GreenRoot</a>
      <ul class="nav-links" role="list">
        <li><a href="index.html"   class="nav-link">Home</a></li>
        <li><a href="catalog.html" class="nav-link active">Catalog</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===================== MAIN ===================== -->
  <main>
    <section class="section" aria-label="Product detail">
      <div class="container">

        <!-- Breadcrumb — product name filled by main.js -->
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span aria-hidden="true">›</span>
          <a href="catalog.html">Catalog</a>
          <span aria-hidden="true">›</span>
          <span id="breadcrumb-name" aria-current="page">Product</span>
        </nav>

        <!-- Product content injected here by main.js renderProduct() -->
        <div id="product-detail"></div>

      </div>
    </section>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2024 GreenRoot. All rights reserved.</p>
      <a href="admin.html" class="footer-admin-link">Admin</a>
    </div>
  </footer>

  <!-- Order modal is injected by initOrderModal() in main.js -->
  <script src="main.js"></script>
</body>
</html>
